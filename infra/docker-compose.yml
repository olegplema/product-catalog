services:
  postgres:
    image: postgres:16
    container_name: product-catalog-postgres
    env_file:
      - ./env/postgres.env
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  localstack:
    container_name: product-catalog-localstack
    # Pinned for stable local development and reviewer-friendly startup without LocalStack auth token.
    image: localstack/localstack:4.3.0
    ports:
      - '4566:4566'
    env_file:
      - ./env/localstack.env
    volumes:
      - ./localstack/init-localstack.sh:/etc/localstack/init/ready.d/init-localstack.sh
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  postgres-data:
  localstack_data:
