services:
  postgres:
    image: postgres:16
    container_name: product-catalog-postgres
    env_file:
      - ./env/postgres.env
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  localstack:
    image: localstack/localstack:4.3.0
    container_name: product-catalog-localstack
    env_file:
      - ./env/localstack.env
    ports:
      - '4566:4566'
    volumes:
      - ./localstack/init-localstack.sh:/etc/localstack/init/ready.d/init-localstack.sh
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'awslocal sqs get-queue-url --queue-name "$$PRODUCT_EVENTS_QUEUE_NAME" --region "$$AWS_DEFAULT_REGION" >/dev/null 2>&1',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  products-service:
    build:
      context: ..
      dockerfile: ./apps/products-service/Dockerfile
      args:
        DATABASE_URL: postgresql://postgres:root@postgres:5432/product_catalog?schema=public
    container_name: product-catalog-products-service
    env_file:
      - ../apps/products-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    ports:
      - '3001:3001'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(\"http://127.0.0.1:3001/products\").then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  notifications-service:
    build:
      context: ..
      dockerfile: ./apps/notifications-service/Dockerfile
    container_name: product-catalog-notifications-service
    env_file:
      - ../apps/notifications-service/.env
    depends_on:
      localstack:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: ./apps/web/Dockerfile
    container_name: product-catalog-web
    depends_on:
      products-service:
        condition: service_healthy
    ports:
      - '8080:80'

volumes:
  postgres-data:
  localstack-data:
